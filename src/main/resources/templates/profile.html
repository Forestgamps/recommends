<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            background-image: url(/images/rename.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .history-item {
            transition: transform 0.3s;
            margin-bottom: 20px;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .history-item:hover {
            transform: translateY(-5px);
        }
        .nav-icon {
            font-size: 1.5rem;
            margin: 0 10px;
            color: #4a6baf;
            transition: all 0.3s;
        }
        .nav-icon:hover {
            color: #2c4a8a;
            transform: scale(1.1);
        }
        .nav-container {
            display: flex;
            justify-content: flex-end;
            padding: 15px 0;
        }
        .loading-spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1050;
        }
        .game-card {
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
        }
        #add-movie-form .row, #add-game-form .row {
            margin-bottom: 15px;
        }

        .tab-content {
            padding: 20px 0;
        }

        .form-label {
            font-weight: 500;
        }

        .required-star::after {
            content: " *";
            color: red;
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('jwt');
    console.log("JWT Payload:", parseJwt(token));
    if (!token) {
        window.location.href = '/';
    }

    const usernameDisplay = document.getElementById('username-display');
    const historyContainer = document.getElementById('history-container');
    const loadingSpinner = document.getElementById('loading-spinner');
    const logoutBtn = document.getElementById('logout-btn');

    // Получаем данные пользователя и историю
    document.addEventListener('DOMContentLoaded', function() {
        loadUserProfile();
    });

    // Загрузка профиля пользователя
    function loadUserProfile() {
        loadingSpinner.style.display = 'block';

        // Получаем имя пользователя из токена
        const username = parseJwt(token).sub;
        usernameDisplay.textContent = `Добро пожаловать, ${username}!`;

        // Загружаем историю запросов
        fetch('/api/history', {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (response.status === 403) {
                throw new Error('Доступ запрещен. Пожалуйста, войдите снова');
            }
            if (!response.ok) {
                throw new Error('Ошибка загрузки истории');
            }
            return response.json();
        })
        .then(history => {
            console.log("Received history data:", history);
            renderHistory(history);
        })
        .catch(error => {
            console.error('Error:', error);
            historyContainer.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-danger">Ошибка при загрузке истории: ${error.message}</div>
                </div>
            `;
        })
        .finally(() => {
            loadingSpinner.style.display = 'none';
        });
    }

    // Отображение истории запросов
    function renderHistory(history) {
        historyContainer.innerHTML = '';
        clearHistoryBtn.style.display = history.length > 0 ? 'block' : 'none';

        if (!Array.isArray(history) || history.length === 0) {
            historyContainer.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-info">История запросов пуста</div>
                </div>
            `;
            return;
        }

        history.forEach(item => {
            const card = document.createElement('div');
            card.className = 'col';
            card.innerHTML = `
                <div class="history-item card h-100">
                    <div class="card-body">
                        <h5 class="card-title">${getRecommendationTypeTitle(item.recommendationType)}</h5>
                        <small class="text-muted">${new Date(item.created_at).toLocaleString()}</small>
                        <div class="mt-3">
                            ${renderHistoryItems(item.content_details)}
                        </div>
                    </div>
                </div>
            `;

            historyContainer.appendChild(card);
        });
    }

    // Рендер элементов истории
    function renderHistoryItems(items) {
    console.log("Rendering items:", items); // Добавьте эту строку

    if (!items || items.length === 0) {
        return '<p>Нет данных о рекомендациях</p>';
    }

    return `
        <div class="d-grid gap-2">
            ${items.slice(0, 3).map(item => {
                console.log("Item details:", item); // Добавьте эту строку
                return `
                <div class="game-card">
                    ${item.image ?
                        `<img src="${item.image}" class="img-fluid mb-2" style="max-height: 100px;">` :
                        `<div class="bg-light mb-2" style="height:100px; display:flex; align-items:center; justify-content:center;">
                            <i class="bi bi-image" style="font-size:2rem;"></i>
                         </div>`
                    }
                    <h6>${item.name || 'Без названия (ID: ' + item.id + ')'}</h6>
                </div>
                `;
            }).join('')}
            ${items.length > 3 ? `<p>И еще ${items.length - 3} элементов...</p>` : ''}
        </div>
    `;
}

    // Выход из системы
    logoutBtn.addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.removeItem('jwt');
        window.location.href = '/';
    });

    // Вспомогательная функция для декодирования JWT
    function parseJwt(token) {
        try {
            return JSON.parse(atob(token.split('.')[1]));
        } catch (e) {
            return null;
        }
    }

    function formatDateTime(dateTimeStr) {
        if (!dateTimeStr) return 'Неизвестная дата';

        try {
            const date = new Date(dateTimeStr);
            return date.toLocaleString('ru-RU');
        } catch (e) {
            console.error('Error formatting date:', e);
            return dateTimeStr;
        }
    }

    // Преобразование типа рекомендации в читаемый формат
    function getRecommendationTypeTitle(type) {
        const types = {
            'similar-games': 'Похожие игры',
            'user-games': 'Персональные рекомендации игр',
            'popular-games': 'Популярные игры',
            'similar-movies': 'Похожие фильмы',
            'user-movies': 'Персональные рекомендации фильмов'
        };
        return types[type] || type;
    }

    // Получаем кнопку очистки истории
const clearHistoryBtn = document.getElementById('clear-history-btn');

// Обработчик очистки истории
clearHistoryBtn.addEventListener('click', function() {
    if (!confirm('Вы уверены, что хотите очистить всю историю запросов? Это действие нельзя отменить.')) {
        return;
    }

    loadingSpinner.style.display = 'block';

    fetch('/api/history', {
        method: 'DELETE',
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        }
    })
    .then(response => {
        if (response.status === 403) {
            throw new Error('Доступ запрещен');
        }
        if (!response.ok) {
            throw new Error('Ошибка при очистке истории');
        }
        return response.json();
    })
    .then(data => {
        alert(`История успешно очищена. Удалено записей: ${data.deletedCount}`);
        // Обновляем историю на странице
        historyContainer.innerHTML = `
            <div class="col-12">
                <div class="alert alert-info">История запросов пуста</div>
            </div>
        `;
    })
    .catch(error => {
        console.error('Error:', error);
        alert(`Ошибка при очистке истории: ${error.message}`);
    })
    .finally(() => {
        loadingSpinner.style.display = 'none';
    });
});

        alert(`Фильм "${data.title}" успешно добавлен! ID: ${data.id}`);
        bootstrap.Modal.getInstance(document.getElementById('addContentModal')).hide();
    })
    .catch(handleError);
});

// Отправка формы игры
document.getElementById('submit-game-btn').addEventListener('click', function() {
    const formData = new FormData(document.getElementById('add-game-form'));

    const gameData = {
        name: formData.get('name'),
        releaseDate: formData.get('releaseDate') ? new Date(formData.get('releaseDate')).toISOString() : null,
        english: formData.get('english') === 'true',
        developer: formData.get('developer'),
        publisher: formData.get('publisher'),
        requiredAge: formData.get('requiredAge') ? parseInt(formData.get('requiredAge')) : null,
        achievements: formData.get('achievements') ? parseInt(formData.get('achievements')) : null,
        positiveRatings: formData.get('positiveRatings') ? parseInt(formData.get('positiveRatings')) : null,
        negativeRatings: formData.get('negativeRatings') ? parseInt(formData.get('negativeRatings')) : null,
        averagePlaytime: formData.get('averagePlaytime') ? parseInt(formData.get('averagePlaytime')) : null,
        medianPlaytime: formData.get('medianPlaytime') ? parseInt(formData.get('medianPlaytime')) : null,
        owners: formData.get('owners'),
        price: formData.get('price') ? parseFloat(formData.get('price')) : null,
        platforms: formData.get('platforms') ?
            formData.get('platforms').split(',').map(p => p.trim()).filter(p => p) : [],
        categories: formData.get('categories') ?
            formData.get('categories').split(',').map(c => c.trim()).filter(c => c) : [],
        genres: formData.get('genres') ?
            formData.get('genres').split(',').map(g => g.trim()).filter(g => g) : [],
        tags: formData.get('tags') ?
            formData.get('tags').split(',').map(t => t.trim()).filter(t => t) : []
    };

    fetch('/api/admin/content/games', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(gameData)
    })
    .then(handleResponse)
    .then(data => {
        alert(`Игра "${data.name}" успешно добавлена! ID: ${data.id}`);
        bootstrap.Modal.getInstance(document.getElementById('addContentModal')).hide();
    })
    .catch(handleError);
});

// Обработчик ответов
function handleResponse(response) {
    if (!response.ok) {
        return response.json().then(err => Promise.reject(err));
    }
    return response.json();
}

// Обработчик ошибок
function handleError(error) {
    console.error('Ошибка:', error);
    let message = error.message || 'Неизвестная ошибка';
    if (error.details) {
        message += '\nДетали: ' + error.details.join('\n');
    }
    alert(`Ошибка: ${message}`);
}

// Удаление фильма
document.getElementById('confirm-delete-movie').addEventListener('click', function() {
    const movieId = document.getElementById('delete-movie-id').value;
    const movieTitle = document.getElementById('delete-movie-title').value;

    if (!movieId) {
        alert('Выберите фильм для удаления');
        return;
    }

    if (!confirm(`Вы уверены, что хотите удалить фильм "${movieTitle}" (ID: ${movieId})? Это действие нельзя отменить.`)) {
        return;
    }

    fetch(`/api/admin/content/movies/${movieId}`, {
        method: 'DELETE',
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(response => {
        if (response.status === 204) {
            alert(`Фильм "${movieTitle}" успешно удален!`);
            // Очищаем поля
            document.getElementById('delete-movie-id').value = '';
            document.getElementById('delete-movie-title').value = '';
            // Очищаем результаты поиска
            document.getElementById('movie-search-results').innerHTML = '';
            document.getElementById('search-movie').value = '';
        } else if (response.status === 404) {
            alert('Фильм не найден');
        } else {
            throw new Error('Ошибка удаления фильма');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert(`Ошибка при удалении фильма: ${error.message}`);
    });
});

// Поиск фильмов для удаления
document.getElementById('search-movie-btn').addEventListener('click', function() {
    const query = document.getElementById('search-movie').value.trim();
    if (!query) {
        alert('Введите поисковый запрос');
        return;
    }

    fetch(`/api/movies/search?query=${encodeURIComponent(query)}`, {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(response => response.json())
    .then(movies => {
        const resultsContainer = document.getElementById('movie-search-results');
        resultsContainer.innerHTML = '';

        if (movies.length === 0) {
            resultsContainer.innerHTML = '<div class="list-group-item">Фильмы не найдены</div>';
            return;
        }

        movies.forEach(movie => {
            const item = document.createElement('div');
            item.className = 'list-group-item list-group-item-action';
            item.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-0">${movie.title}</h6>
                        <small>ID: ${movie.id} | Дата выхода: ${movie.releaseDate || 'неизвестно'}</small>
                    </div>
                    <button class="btn btn-sm btn-outline-danger select-movie-btn"
                            data-id="${movie.id}"
                            data-title="${movie.title}">
                        Выбрать
                    </button>
                </div>
            `;
            resultsContainer.appendChild(item);
        });

        // Добавляем обработчики для кнопок выбора
        document.querySelectorAll('.select-movie-btn').forEach(button => {
            button.addEventListener('click', function() {
                document.getElementById('delete-movie-id').value = this.dataset.id;
                document.getElementById('delete-movie-title').value = this.dataset.title;
            });
        });
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Ошибка при поиске фильмов');
    });
});
