<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Подбор фильмов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            background-image: url([[@{/images/rename.jpg}]]);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .movie-card {
            transition: transform 0.3s;
            margin-bottom: 20px;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            height: 100%;
        }
        .movie-card:hover {
            transform: translateY(-5px);
        }
        #search-container {
            position: relative;
        }
        #suggestions {
            position: absolute;
            width: 100%;
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
        }
        .genre-badge {
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .selected-movie-badge {
            background-color: #4a6baf;
        }
        .loading-spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1050;
        }
        /* Стили для навигации */
        .nav-icon {
            font-size: 1.5rem;
            margin: 0 10px;
            color: #4a6baf;
            transition: all 0.3s;
        }
        .nav-icon:hover {
            color: #2c4a8a;
            transform: scale(1.1);
        }
        .nav-container {
            display: flex;
            justify-content: flex-end;
            padding: 15px 0;
        }
        .card-description {
            height: 120px;
            overflow: hidden;
            position: relative;
        }
        .card-description:after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), white);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Навигационная панель -->
    <div class="nav-container">
        <a href="/games" class="nav-icon" title="Игры">
            <i class="bi bi-joystick"></i>
        </a>
        <a href="/profile" class="nav-icon" title="Профиль">
            <i class="bi bi-person-circle"></i>
        </a>
    </div>

    <h1 class="mb-4 text-center">Подбор фильмов</h1>

    <div class="row mb-4">
        <div class="col-md-8 mx-auto">
            <div id="search-container">
                <input type="text" id="search-input" class="form-control form-control-lg"
                       placeholder="Начните вводить название фильма...">
                <div id="suggestions" class="list-group d-none"></div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <h4>Выбранные фильмы:</h4>
            <div id="selected-movies" class="d-flex flex-wrap gap-2 mb-3"></div>
            <button id="recommend-btn" class="btn btn-success btn-lg" disabled>
                <i class="bi bi-magic"></i> Подобрать рекомендации
            </button>
        </div>
    </div>

    <div class="row">
        <div id="results" class="row row-cols-1 row-cols-md-3 g-4"></div>
    </div>
</div>

<div id="loading-spinner" class="loading-spinner">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
        <span class="visually-hidden">Загрузка...</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('jwt');
    if (!token) {
        window.location.href = '/';
    }
    const searchInput = document.getElementById('search-input');
    const suggestions = document.getElementById('suggestions');
    const selectedMoviesContainer = document.getElementById('selected-movies');
    const recommendBtn = document.getElementById('recommend-btn');
    const resultsContainer = document.getElementById('results');
    const loadingSpinner = document.getElementById('loading-spinner');

    let selectedMovies = [];
    let searchTimeout = null;

    // Поиск фильмов при вводе
    searchInput.addEventListener('input', function(e) {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim();

        if (query.length < 2) {
            suggestions.classList.add('d-none');
            return;
        }

        searchTimeout = setTimeout(() => {
            fetch(`/api/movies/search?query=${encodeURIComponent(query)}`,
            {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            })
                .then(response => response.json())
                .then(movies => {
                    if (movies.length > 0) {
                        showSuggestions(movies);
                    } else {
                        suggestions.classList.add('d-none');
                    }
                })
                .catch(error => {
                    console.error('Search error:', error);
                    suggestions.classList.add('d-none');
                });
        }, 300);
    });

    // Показ подсказок
    function showSuggestions(movies) {
        suggestions.innerHTML = '';
        suggestions.classList.remove('d-none');

        movies.forEach(movie => {
            if (selectedMovies.some(m => m.id === movie.id)) return;

            const item = document.createElement('a');
            item.className = 'list-group-item list-group-item-action';
            item.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${movie.title}</strong>
                        ${movie.releaseDate ? `<span class="text-muted ms-2">${movie.releaseDate.substring(0, 4)}</span>` : ''}
                    </div>
                </div>
            `;

            item.addEventListener('click', () => {
                addSelectedMovie(movie);
                searchInput.value = '';
                suggestions.classList.add('d-none');
            });

            suggestions.appendChild(item);
        });
    }

    // Добавление выбранного фильма
    function addSelectedMovie(movie) {
        if (selectedMovies.some(m => m.id === movie.id)) return;

        selectedMovies.push(movie);
        updateSelectedMoviesList();
        recommendBtn.disabled = selectedMovies.length === 0;
    }

    // Обновление списка выбранных фильмов
    function updateSelectedMoviesList() {
        selectedMoviesContainer.innerHTML = '';

        selectedMovies.forEach(movie => {
            const badge = document.createElement('div');
            badge.className = 'badge selected-movie-badge text-white p-2 d-flex align-items-center';
            badge.innerHTML = `
                ${movie.title}
                <button type="button" class="btn-close btn-close-white ms-2" aria-label="Удалить"></button>
            `;

            badge.querySelector('.btn-close').addEventListener('click', (e) => {
                e.stopPropagation();
                selectedMovies = selectedMovies.filter(m => m.id !== movie.id);
                updateSelectedMoviesList();
                recommendBtn.disabled = selectedMovies.length === 0;
            });

            selectedMoviesContainer.appendChild(badge);
        });
    }

    // Получение рекомендаций
    recommendBtn.addEventListener('click', function() {
        loadingSpinner.style.display = 'block';
        resultsContainer.innerHTML = '';

        const movieIds = selectedMovies.map(movie => movie.id);
        fetch(`/api/recommendations/multi?movieIds=${movieIds.join('&movieIds=')}`,
        {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                const movies = Array.isArray(data) ? data : [];
                showRecommendations(movies);
            })
            .catch(error => {
                console.error('Recommendation error:', error);
                resultsContainer.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger">Ошибка при получении рекомендаций: ${error.message}</div>
                    </div>
                `;
            })
            .finally(() => {
                loadingSpinner.style.display = 'none';
            });
    });

    // Отображение результатов
    function showRecommendations(movies) {
        resultsContainer.innerHTML = '';

        if (!Array.isArray(movies) || movies.length === 0) {
            resultsContainer.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-info">Не найдено рекомендаций. Попробуйте выбрать другие фильмы.</div>
                </div>
            `;
            return;
        }

        movies.forEach(movie => {
            const card = `
            <div class="col">
                <div class="movie-card card h-100">
                    <!-- Добавляем постер -->
                    <img src="${movie.poster_path || 'https://via.placeholder.com/300x450?text=No+Image'}"
                         class="card-img-top movie-poster" alt="${movie.title || 'Без названия'}">

                    <div class="card-body">
                        <h5 class="card-title">${movie.title || 'Без названия'}</h5>

                        <!-- Блок с годом и рейтингом -->
                        <div class="d-flex justify-content-between mb-2">
                            ${movie.releaseDate ? `
                                <small class="text-muted">${movie.releaseDate.substring(0,4)}</small>
                            ` : ''}

                            ${movie.voteAverage ? `
                                <small class="text-muted">★ ${Number(movie.voteAverage).toFixed(1)}/10</small>
                            ` : ''}
                        </div>

                        <!-- Блок с жанрами -->
                        <div class="mb-2">
                            ${movie.genres && movie.genres.length > 0 ?
                                movie.genres.map(g => `
                                    <span class="badge bg-secondary genre-badge">${g}</span>
                                `).join('') : ''
                            }
                        </div>

                        <!-- Описание (с градиентным эффектом) -->
                        <div class="card-description">
                            ${movie.desc ? `
                                <p class="card-text">${movie.desc}</p>
                            ` : '<p class="card-text text-muted">Описание отсутствует</p>'}
                        </div>
                    </div>

                    <!-- Футер карточки -->
                    <div class="card-footer bg-white d-flex justify-content-end">
                        <button class="btn btn-sm btn-outline-secondary mark-watched"
                                data-type="movie"
                                data-id="${movie.id}"
                                title="Отметить как просмотренное">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
            `;
            resultsContainer.innerHTML += card;
        });
    }

    // Скрытие подсказок при клике вне поля
    document.addEventListener('click', function(e) {
        if (e.target !== searchInput) {
            suggestions.classList.add('d-none');
        }
    });

    document.body.addEventListener('click', function(e) {
        const watchedBtn = e.target.closest('.mark-watched');
        if (watchedBtn) {
            const type = watchedBtn.dataset.type;
            const id = watchedBtn.dataset.id;

            fetch('/api/history/watch', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    contentType: type,
                    contentId: id
                })
            })
            .then(response => {
                if (response.ok) {
                    // Скрываем карточку
                    watchedBtn.closest('.movie-card').style.opacity = '0.5';
                    watchedBtn.disabled = true;
                    watchedBtn.innerHTML = '<i class="bi bi-check"></i> Просмотрено';
                } else {
                    alert('Не удалось сохранить. Возможно, проблема с авторизацией.');
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
            });
        }
    });
</script>
</body>
</html>
